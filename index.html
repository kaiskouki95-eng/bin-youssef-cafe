<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مقهى بن يوسف PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #2ecc71; --danger: #e74c3c; --bg: #f4f7f6; --card: #ffffff; --text: #333; }
        body.dark-mode { --bg: #1a1a2e; --card: #16213e; --text: #e9ecef; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; margin: 0; min-height: 100vh; transition: 0.3s; }
        .container { max-width: 1200px; margin: 0 auto; display: none; padding: 10px; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 0 0 20px 20px; text-align: center; position: relative; }
        .nav-tabs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 15px 5px; }
        .nav-tab { padding: 10px 5px; background: var(--card); border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: var(--primary); font-size: 0.7rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-tab.active { background: var(--primary); color: white; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; font-family: 'Cairo'; width: 100%; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #777; font-size: 0.75rem; border-bottom: 2px solid #eee; padding: 5px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; font-weight: 600; font-size: 0.85rem; }
        .input-field { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-family: 'Cairo'; text-align: center; box-sizing: border-box; }
        .kn-mark { position: absolute; bottom: 15px; right: 15px; color: red; font-weight: 800; font-size: 1.2rem; }
        #pdfReportTemplate { position: fixed; left: -9999px; top: 0; width: 800px; background: white; padding: 40px; color: black; }
    </style>
</head>
<body>

<div id="loginScreen" style="height:100vh; display:flex; justify-content:center; align-items:center; background:var(--primary); position:relative;">
    <div class="card" style="width:300px; text-align:center;">
        <h2 style="color:var(--primary); margin-bottom:20px;">مقهى بن يوسف ☕</h2>
        <input type="password" id="passInput" class="input-field" placeholder="كلمة السر">
        <button class="btn" style="background:var(--primary);" onclick="checkPass()">دخول</button>
    </div>
    <div class="kn-mark">k-N</div>
</div>

<div class="container" id="mainApp">
    <div class="header">
        <button onclick="document.body.classList.toggle('dark-mode')" style="position:absolute; left:10px; top:10px; background:none; border:none; color:white;">🌓</button>
        <h1 style="margin:0; font-size:1.3rem;">☕ بن يوسف PRO</h1>
    </div>

    <div class="nav-tabs">
        <button class="nav-tab active" onclick="showTab('sales', this)">📊 مبيعات</button>
        <button class="nav-tab" onclick="showTab('WATER', this)">💧 مياه</button>
        <button class="nav-tab" onclick="showTab('HOT', this)">🫘 بن</button>
        <button class="nav-tab" onclick="showTab('SODA', this)">🥤 غازيات</button>
        <button class="nav-tab" onclick="showTab('JUICE', this)">🍹 عصائر</button>
        <button class="nav-tab" onclick="showTab('SHISHA', this)">🌬️ شيشة</button>
        <button class="nav-tab" onclick="showTab('expenses', this)">💸 مصاريف</button>
        <button class="nav-tab" onclick="showTab('settings', this)">⚙️ إعدادات</button>
    </div>

    <div id="sales" class="tab-content">
        <div class="card">
            <h3 style="margin:0">تسجيل المبيعات</h3>
            <div style="display:flex; gap:5px; margin: 10px 0;">
                <input type="date" id="saleDate" class="input-field" style="flex:2;">
                <button class="btn" style="background:#e67e22; flex:1; font-size:0.65rem;" onclick="generatePDF('يومي')">تقرير PDF</button>
            </div>
            <table>
                <thead><tr><th>الصنف</th><th>المخزن</th><th>السعر</th><th>الكمية</th></tr></thead>
                <tbody id="salesBody"></tbody>
            </table>
            <div style="background:#fff8e1; color:#f57f17; padding:15px; border-radius:12px; font-size:1.1rem; font-weight:800; margin-top:15px; text-align:center;">
                الإجمالي: <span id="dailyTotalDisplay">0.000</span> DT
            </div>
            <button class="btn" style="background:var(--primary); height:50px; margin-top:15px;" onclick="processSale()">💾 حفظ المبيعات</button>
        </div>
    </div>

    <div id="settings" class="tab-content" style="display:none">
        <div class="card">
            <h3>⚙️ الإعدادات</h3>
            <button class="btn" style="background:#34495e" onclick="changePass()">🔐 تغيير كلمة السر</button>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#27ae60; flex:1" onclick="exportData()">📤 تصدير نسخة</button>
                <button class="btn" style="background:#2980b9; flex:1" onclick="document.getElementById('importFile').click()">📥 استيراد نسخة</button>
            </div>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
            <hr>
            <div id="manageItemsArea"></div>
        </div>
    </div>
</div>

<div id="pdfReportTemplate">
    <h1 style="text-align:center;">تقرير مبيعات بن يوسف</h1>
    <h3 id="pdfTitle" style="text-align:center;"></h3>
    <table style="width:100%; border-collapse:collapse; margin-top:20px; border:1px solid #000;">
        <thead><tr style="background:#eee;"><th>التاريخ</th><th>الصنف</th><th>الكمية</th><th>المجموع</th></tr></thead>
        <tbody id="pdfTbody" style="text-align:center;"></tbody>
    </table>
    <h2 id="pdfSummary" style="text-align:right; margin-top:20px;"></h2>
</div>

<script>
    const DB_KEY = 'BIN_YOUSSEF_CLEAN_V1';
    let db = JSON.parse(localStorage.getItem(DB_KEY)) || { items: [], history: [], appPass: "1234", coffeeStock: 0 };

    function checkPass() {
        if (document.getElementById('passInput').value === (db.appPass || "1234")) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('saleDate').valueAsDate = new Date();
            renderAll();
        } else { alert("كلمة سر خاطئة!"); }
    }

    function renderAll() {
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        renderSales(); renderSettings();
    }

    function renderSales() {
        document.getElementById('salesBody').innerHTML = db.items.map((it, i) => `
            <tr>
                <td>${it.name}</td>
                <td>${it.cat==='HOT'?'---':it.stock}</td>
                <td>${it.price.toFixed(3)}</td>
                <td><input type="number" class="qty-in input-field" data-idx="${i}" value="0" oninput="calcTotal()" style="width:60px; margin:0;"></td>
            </tr>`).join('');
    }

    function processSale() {
        const date = document.getElementById('saleDate').value;
        document.querySelectorAll('.qty-in').forEach(inp => {
            const q = parseFloat(inp.value)||0;
            if(q > 0) {
                const it = db.items[inp.dataset.idx];
                if(it.cat==='HOT') db.coffeeStock -= (q * it.grams / 1000); else it.stock -= q;
                db.history.push({date, name: it.name, cat: it.cat, qty: q, total: (q * it.price)});
                inp.value = 0;
            }
        });
        renderAll(); alert("تم الحفظ بنجاح!");
    }

    function renderSettings() {
        document.getElementById('manageItemsArea').innerHTML = `<h3>إدارة المشروبات</h3>
            <input id="itN" class="input-field" placeholder="اسم المشروب">
            <select id="itC" class="input-field"><option value="HOT">بن</option><option value="WATER">مياه</option><option value="SODA">غازيات</option><option value="JUICE">عصائر</option></select>
            <input id="itP" type="number" class="input-field" placeholder="السعر">
            <button class="btn" style="background:var(--accent)" onclick="addItem()">إضافة</button>
            <hr>` + db.items.map((it,i) => `<div>${it.name} <button onclick="db.items.splice(${i},1);renderAll();">🗑️</button></div>`).join('');
    }

    function addItem() {
        db.items.push({name:document.getElementById('itN').value, cat:document.getElementById('itC').value, price:parseFloat(document.getElementById('itP').value)||0, stock:100, grams:7});
        renderAll();
    }

    async function generatePDF(type) {
        const selDate = document.getElementById('saleDate').value;
        let logs = db.history.filter(h => h.date === selDate);
        let t = 0;
        document.getElementById('pdfTbody').innerHTML = logs.map(s => { t+=s.total; return `<tr><td>${s.date}</td><td>${s.name}</td><td>${s.qty}</td><td>${s.total.toFixed(3)}</td></tr>`; }).join('');
        document.getElementById('pdfSummary').innerText = `الإجمالي: ${t.toFixed(3)} DT`;
        document.getElementById('pdfTitle').innerText = `يوم ${selDate}`;
        const canvas = await html2canvas(document.getElementById('pdfReportTemplate'));
        const pdf = new jspdf.jsPDF();
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 190, 0);
        pdf.save(`Bin_Youssef_${selDate}.pdf`);
    }

    function calcTotal() { let t=0; document.querySelectorAll('.qty-in').forEach(inp=>t+=(parseFloat(inp.value)||0)*db.items[inp.dataset.idx].price); document.getElementById('dailyTotalDisplay').innerText=t.toFixed(3); }
    function showTab(id, btn) { document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none'); document.getElementById(id).style.display='block'; }
    function exportData() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); const dl = document.createElement('a'); dl.setAttribute("href", dataStr); dl.setAttribute("download", "backup.json"); dl.click(); }
    function importData(e) { const reader = new FileReader(); reader.onload = (ev) => { db = JSON.parse(ev.target.result); renderAll(); alert("تم الاستيراد!"); }; reader.readAsText(e.target.files[0]); }
    function changePass() { const p = prompt("كلمة السر الجديدة:"); if(p) { db.appPass = p; renderAll(); } }
</script>
</body>
</html>
